<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- TÍTULO PARA MANTER O ÍCONE "T" -->
    <title>TREINO EM CASA</title>

    <!-- CONFIGURAÇÕES DE WEB APP -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Treino Casa">

    <!-- Google Fonts Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gemini-bg': '#0a0a0b',
                        'gemini-surface': '#1e1f20',
                        'gemini-border': '#333537',
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
        }

        body { 
            font-family: 'Poppins', sans-serif;
            background-color: #0a0a0b;
            color: #e3e3e3;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Ajuste específico para o topo do iPhone */
        .iphone-header {
            padding-top: calc(var(--safe-top) + 2rem); /* Espaço da ilha dinâmica + 2rem */
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-active-weight {
            background-color: #6366f1 !important;
            color: white !important;
            box-shadow: 0 8px 20px -5px rgba(99, 102, 241, 0.6);
            border: none !important;
        }

        .btn-active-cardio {
            background-color: #f97316 !important;
            color: white !important;
            box-shadow: 0 8px 20px -5px rgba(249, 115, 22, 0.6);
            border: none !important;
        }

        .card-tap {
            transition: transform 0.1s ease, background-color 0.2s ease;
        }
        .card-tap:active {
            transform: scale(0.97);
        }

        .history-card { background: linear-gradient(145deg, #1e1f20, #0a0a0b); }
    </style>
</head>
<body class="pb-32">
    <div id="app"></div>

    <script>
        const APP_NAME = "TREINO EM CASA";
        const SUB_TITLE = "ACADEMIA E COLUNA";

        const workoutData = [
            { day: "Segunda", muscles: "Peito, Ombro e Tríceps", type: "weight", exercises: [
                { name: "Supino Reto com Halteres", sets: "3x12" }, 
                { name: "Crucifixo Sentado (Máquina)", sets: "3x15" },
                { name: "Desenv. Sentado com Apoio", sets: "3x10" }, 
                { name: "Elevação Lateral Sentado", sets: "3x15" },
                { name: "Tríceps Pulley na Polia", sets: "3x12" }, 
                { name: "Tríceps Corda na Polia", sets: "3x12" }
            ]},
            { day: "Terça", muscles: "Costas e Bíceps", type: "weight", exercises: [
                { name: "Puxada Aberta Pulley", sets: "3x12" }, 
                { name: "Puxada com Triângulo", sets: "3x12" },
                { name: "Remada Serrote (Apoio no Banco)", sets: "4x10" }, 
                { name: "Remada Baixa Sentada", sets: "3x12" },
                { name: "Rosca Martelo Sentado", sets: "3x12" }, 
                { name: "Rosca Direta Sentado (Banco 45°)", sets: "3x12" }
            ]},
            { day: "Quarta", muscles: "Pernas (Proteção)", type: "weight", exercises: [
                { name: "Cadeira Extensora", sets: "3x15" },
                { name: "Cadeira Flexora", sets: "3x15" }, 
                { name: "Leg Press 45° (Amp. Curta)", sets: "3x12" }, 
                { name: "Elevação Pélvica no Solo", sets: "3x20" },
                { name: "Abdução de Quadril (Deitado)", sets: "3x20" },
                { name: "Panturrilha Sentado", sets: "4x20" }
            ]},
            { day: "Quinta", muscles: "Cardio e Mobilidade", type: "cardio", exercises: [
                { name: "Caminhada (Sem Inclinação)", sets: "30 min" }, 
                { name: "Alongamento de Isquiotibiais", sets: "3x30s" }
            ]},
            { day: "Sexta", muscles: "Full Body Adaptado", type: "weight", exercises: [
                { name: "Supino Inclinado com Halteres", sets: "3x12" }, 
                { name: "Remada Sentada (Apoio Peito)", sets: "3x12" }, 
                { name: "Elevação Frontal Sentado", sets: "3x12" }, 
                { name: "Cadeira Extensora", sets: "3x15" }, 
                { name: "Rosca Alternada Sentada", sets: "3x15" }
            ]},
            { day: "Sábado", muscles: "Posterior e Glúteo", type: "weight", exercises: [
                { name: "Cadeira Flexora", sets: "4x12" }, 
                { name: "Elevação Pélvica no Solo", sets: "3x20" },
                { name: "Cadeira Extensora", sets: "3x15" }, 
                { name: "Glúteo 4 Apoios (Solo)", sets: "3x15" },
                { name: "Prancha Abdominal", sets: "3x30s" }
            ]},
            { day: "Domingo", muscles: "Recuperação", type: "cardio", exercises: [
                { name: "Caminhada Leve", sets: "30 min" }
            ]}
        ];

        function getWeekID() {
            const now = new Date();
            const onejan = new Date(now.getFullYear(), 0, 1);
            const week = Math.ceil((((now - onejan) / 86400000) + onejan.getDay() + 1) / 7);
            return `${now.getFullYear()}-W${week}`;
        }

        let currentDayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
        let completed = JSON.parse(localStorage.getItem('gym_completed_vFinal') || '{}');
        let history = JSON.parse(localStorage.getItem('gym_history_vFinal') || '[]');
        let lastWeek = localStorage.getItem('gym_last_week_vFinal');

        const currentWeek = getWeekID();
        if (lastWeek && lastWeek !== currentWeek) {
            const doneCount = Object.keys(completed).length;
            if (doneCount > 0) {
                const totalExercises = workoutData.reduce((acc, day) => acc + day.exercises.length, 0);
                history.unshift({
                    date: new Date().toLocaleDateString('pt-BR'),
                    stats: { done: doneCount, total: totalExercises, pct: Math.round((doneCount / totalExercises) * 100) }
                });
                localStorage.setItem('gym_history_vFinal', JSON.stringify(history.slice(0, 10)));
                completed = {};
                localStorage.setItem('gym_completed_vFinal', JSON.stringify(completed));
            }
        }
        localStorage.setItem('gym_last_week_vFinal', currentWeek);

        function toggle(day, ex) {
            const key = `${day}-${ex}`;
            completed[key] = !completed[key];
            localStorage.setItem('gym_completed_vFinal', JSON.stringify(completed));
            render();
        }

        function resetDay() {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-6';
            modal.innerHTML = `
                <div class="bg-gemini-surface p-8 rounded-[2rem] border border-gemini-border w-full max-w-xs text-center">
                    <p class="font-bold text-white mb-6">Limpar o progresso de hoje?</p>
                    <div class="flex gap-3">
                        <button id="cancel-reset" class="flex-1 py-3 rounded-xl bg-gemini-bg text-slate-400 font-bold">Não</button>
                        <button id="confirm-reset" class="flex-1 py-3 rounded-xl bg-red-500/20 text-red-500 font-bold border border-red-500/30">Sim</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('cancel-reset').onclick = () => modal.remove();
            document.getElementById('confirm-reset').onclick = () => {
                Object.keys(completed).forEach(key => { if(key.startsWith(currentDayIdx + '-')) delete completed[key]; });
                localStorage.setItem('gym_completed_vFinal', JSON.stringify(completed));
                modal.remove();
                render();
            };
        }

        function showHistory() {
            const modal = document.createElement('div');
            modal.id = 'history-modal';
            modal.className = 'fixed inset-0 z-[100] bg-black/95 backdrop-blur-md p-8 overflow-y-auto iphone-header';
            let historyHTML = `
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-3xl font-black text-indigo-500 italic uppercase tracking-tighter">Histórico</h2>
                    <button onclick="document.getElementById('history-modal').remove()" class="w-12 h-12 flex items-center justify-center bg-gemini-surface rounded-2xl border border-gemini-border shadow-lg"><i data-lucide="x" class="text-slate-400"></i></button>
                </div>
                <div class="space-y-6">
            `;
            if (history.length === 0) {
                historyHTML += `<p class="text-center text-slate-500 py-20 text-sm font-bold uppercase tracking-widest leading-relaxed opacity-60">Ainda estás na primeira semana!</p>`;
            } else {
                history.forEach(item => {
                    historyHTML += `
                        <div class="history-card p-6 rounded-[2rem] border border-gemini-border shadow-xl">
                            <div class="flex justify-between items-center">
                                <div><p class="text-[11px] font-bold text-indigo-500/80 uppercase tracking-widest mb-1">Semana de ${item.date}</p>
                                <h3 class="text-xl font-black text-white leading-none">${item.stats.done} Concluídos</h3></div>
                                <span class="bg-indigo-500/20 text-indigo-400 text-xs font-black px-4 py-2 rounded-full border border-indigo-500/30">${item.stats.pct}%</span>
                            </div>
                        </div>
                    `;
                });
            }
            historyHTML += `</div>`;
            modal.innerHTML = historyHTML;
            document.body.appendChild(modal);
            lucide.createIcons();
        }

        function render() {
            const day = workoutData[currentDayIdx];
            const exs = day.exercises;
            const doneToday = exs.filter((_, i) => completed[`${currentDayIdx}-${i}`]).length;
            const pctToday = Math.round((doneToday / exs.length) * 100);
            const formattedDayName = (day.day === "Sábado" || day.day === "Domingo") ? day.day : `${day.day}-feira`;

            document.getElementById('app').innerHTML = `
                <header class="px-8 pb-10 sticky top-0 z-20 bg-gemini-bg/95 backdrop-blur-lg rounded-b-[3rem] border-b border-gemini-border shadow-2xl iphone-header">
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <p class="text-[11px] font-black uppercase tracking-[0.3em] text-indigo-500/80 mb-2">${SUB_TITLE}</p>
                            <h1 class="text-3xl font-black italic tracking-tighter text-white leading-none">${APP_NAME}</h1>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="showHistory()" class="w-12 h-12 flex items-center justify-center bg-gemini-surface border border-gemini-border rounded-2xl text-slate-400 active:scale-90 transition-all shadow-lg"><i data-lucide="history" class="w-6 h-6"></i></button>
                            <button onclick="resetDay()" class="w-12 h-12 flex items-center justify-center bg-gemini-surface border border-gemini-border rounded-2xl text-slate-400 active:scale-90 transition-all shadow-lg"><i data-lucide="refresh-cw" class="w-6 h-6"></i></button>
                        </div>
                    </div>
                    <div class="bg-gemini-surface p-5 rounded-[2rem] border border-gemini-border shadow-inner text-center">
                        <div class="w-full bg-gemini-bg h-2 rounded-full overflow-hidden mb-2"><div class="bg-indigo-500 h-full transition-all duration-1000 shadow-[0_0_15px_rgba(99,102,241,0.5)]" style="width: ${pctToday}%"></div></div>
                        <span class="text-[10px] font-black uppercase text-slate-500 tracking-widest">${pctToday}% CONCLUÍDO HOJE</span>
                    </div>
                </header>

                <div class="flex overflow-x-auto gap-4 p-8 no-scrollbar snap-x">
                    ${workoutData.map((d, i) => {
                        const isActive = currentDayIdx === i;
                        const colorClass = d.type === 'cardio' ? 'btn-active-cardio' : 'btn-active-weight';
                        return `<button onclick="currentDayIdx=${i}; render()" class="flex-shrink-0 snap-start px-8 py-3.5 rounded-full text-[11px] font-black border transition-all ${isActive ? colorClass : 'bg-gemini-surface text-slate-500 border-gemini-border'}">${d.day.toUpperCase()}</button>`;
                    }).join('')}
                </div>

                <main class="px-8 space-y-5">
                    <div class="bg-gemini-surface p-8 rounded-[2.5rem] border border-gemini-border flex justify-between items-center relative overflow-hidden shadow-2xl">
                        <div class="absolute left-0 top-0 bottom-0 w-3 ${day.type === 'cardio' ? 'bg-orange-500' : 'bg-indigo-600'}"></div>
                        <div>
                            <h2 class="text-2xl font-black text-white tracking-tight leading-tight mb-1">${formattedDayName}</h2>
                            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.15em]">${day.muscles}</p>
                        </div>
                        <div class="text-slate-700/30"><i data-lucide="${day.type === 'cardio' ? 'heart-pulse' : 'shield-check'}" class="w-12 h-12"></i></div>
                    </div>

                    <div class="space-y-4 pb-32">
                        ${exs.map((ex, i) => {
                            const isDone = completed[`${currentDayIdx}-${i}`];
                            return `
                            <div onclick="toggle(${currentDayIdx}, ${i})" class="card-tap flex items-center gap-6 p-6 rounded-[2.5rem] border transition-all duration-300 ${isDone ? 'bg-emerald-950/10 border-emerald-900/20 opacity-40 scale-[0.98]' : 'bg-gemini-surface border-gemini-border shadow-xl'}">
                                <div class="w-12 h-12 rounded-full flex-shrink-0 flex items-center justify-center transition-all ${isDone ? 'bg-emerald-600 text-white shadow-lg' : 'bg-gemini-bg border-2 border-gemini-border text-transparent'}">
                                    <i data-lucide="check" class="w-7 h-7" stroke-width="4"></i>
                                </div>
                                <div class="flex-1">
                                    <h3 class="font-bold text-lg ${isDone ? 'text-slate-600 line-through font-normal' : 'text-slate-100'} leading-snug">${ex.name}</h3>
                                    <span class="text-[11px] font-black text-indigo-400/80 uppercase mt-1.5 inline-block tracking-widest">${ex.sets}</span>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </main>

                <footer class="fixed bottom-10 left-0 right-0 flex justify-center pointer-events-none px-8">
                    <div class="bg-gemini-surface/90 text-slate-500 px-10 py-4 rounded-full text-[10px] font-black tracking-[0.4em] uppercase border border-gemini-border backdrop-blur-xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex items-center gap-4">
                        <i data-lucide="dumbbell" class="w-5 h-5 text-indigo-500 fill-indigo-500"></i>
                        PRO WORKOUT • V13
                    </div>
                </footer>
            `;
            lucide.createIcons();
        }
        render();
    </script>
</body>
</html>
