<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>TREINO EM CASA</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TREINO">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gemini-bg': '#131314',
                        'gemini-surface': '#1e1f20',
                        'gemini-border': '#333537',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #131314; color: #e3e3e3; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        header { padding-top: env(safe-area-inset-top); }
        .btn-active-weight { background-color: #6366f1 !important; color: white !important; box-shadow: 0 8px 15px -5px rgba(99, 102, 241, 0.5); }
        .btn-active-cardio { background-color: #f97316 !important; color: white !important; box-shadow: 0 8px 15px -5px rgba(249, 115, 22, 0.5); }
        .card-tap:active { transform: scale(0.98); }
        .history-card { background: linear-gradient(145deg, #1e1f20, #131314); }
    </style>
</head>
<body class="pb-32">
    <div id="app"></div>

    <script>
        const APP_NAME = "TREINO EM CASA";
        const SUB_TITLE = "ACADEMIA E COLUNA";

        const workoutData = [
            { day: "Segunda", muscles: "Peito, Ombro e Tríceps", type: "weight", exercises: [
                { name: "Supino Reto com Halteres", sets: "3x12" }, 
                { name: "Crucifixo Sentado (Máquina)", sets: "3x15" },
                { name: "Desenv. Sentado com Apoio", sets: "3x10" }, 
                { name: "Elevação Lateral Sentado", sets: "3x15" },
                { name: "Tríceps Pulley na Polia", sets: "3x12" }, 
                { name: "Tríceps Corda na Polia", sets: "3x12" }
            ]},
            { day: "Terça", muscles: "Costas e Bíceps", type: "weight", exercises: [
                { name: "Puxada Aberta Pulley", sets: "3x12" }, 
                { name: "Puxada com Triângulo", sets: "3x12" },
                { name: "Remada Serrote (Apoio no Banco)", sets: "4x10" }, 
                { name: "Remada Baixa Sentada", sets: "3x12" },
                { name: "Rosca Martelo Sentado", sets: "3x12" }, 
                { name: "Rosca Direta Sentado (Banco 45°)", sets: "3x12" }
            ]},
            { day: "Quarta", muscles: "Pernas (Proteção Lombar)", type: "weight", exercises: [
                { name: "Cadeira Extensora", sets: "3x15" },
                { name: "Cadeira Flexora", sets: "3x15" }, 
                { name: "Leg Press 45° (Amplitude Curta)", sets: "3x12" }, 
                { name: "Elevação Pélvica no Solo", sets: "3x20" },
                { name: "Abdução de Quadril (Deitado Lado)", sets: "3x20" },
                { name: "Panturrilha Sentado (Máquina)", sets: "4x20" }
            ]},
            { day: "Quinta", muscles: "Cardio e Mobilidade", type: "cardio", exercises: [
                { name: "Caminhada (Sem Inclinação)", sets: "30 min" }, 
                { name: "Alongamento de Isquiotibiais", sets: "3x30s" }
            ]},
            { day: "Sexta", muscles: "Full Body Adaptado", type: "weight", exercises: [
                { name: "Supino Inclinado com Halteres", sets: "3x12" }, 
                { name: "Remada Sentada (Apoio Peito)", sets: "3x12" }, 
                { name: "Elevação Frontal Sentado", sets: "3x12" }, 
                { name: "Cadeira Extensora", sets: "3x15" }, 
                { name: "Rosca Alternada Sentada", sets: "3x15" }
            ]},
            { day: "Sábado", muscles: "Posterior e Glúteo", type: "weight", exercises: [
                { name: "Cadeira Flexora", sets: "4x12" }, 
                { name: "Elevação Pélvica no Solo", sets: "3x20" },
                { name: "Cadeira Extensora", sets: "3x15" }, 
                { name: "Glúteo 4 Apoios (Solo)", sets: "3x15" },
                { name: "Prancha Abdominal", sets: "3x30s" }
            ]},
            { day: "Domingo", muscles: "Recuperação", type: "cardio", exercises: [
                { name: "Caminhada Leve", sets: "30 min" }
            ]}
        ];

        // --- LÓGICA DE HISTÓRICO E RESET AUTOMÁTICO ---
        function getWeekID() {
            const now = new Date();
            const onejan = new Date(now.getFullYear(), 0, 1);
            const week = Math.ceil((((now - onejan) / 86400000) + onejan.getDay() + 1) / 7);
            return `${now.getFullYear()}-W${week}`;
        }

        let currentDayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
        let completed = JSON.parse(localStorage.getItem('gym_v12_pwa') || '{}');
        let history = JSON.parse(localStorage.getItem('gym_history_v12') || '[]');
        let lastWeek = localStorage.getItem('gym_last_week_v12');

        const currentWeek = getWeekID();
        if (lastWeek && lastWeek !== currentWeek) {
            if (Object.keys(completed).length > 0) {
                const total = workoutData.reduce((acc, d) => acc + d.exercises.length, 0);
                const done = Object.keys(completed).length;
                history.unshift({
                    date: new Date().toLocaleDateString('pt-BR'),
                    stats: { done, total, pct: Math.round((done / total) * 100) }
                });
                localStorage.setItem('gym_history_v12', JSON.stringify(history.slice(0, 10)));
                completed = {};
                localStorage.setItem('gym_v12_pwa', JSON.stringify(completed));
            }
        }
        localStorage.setItem('gym_last_week_v12', currentWeek);

        function toggle(day, ex) {
            const key = `${day}-${ex}`;
            completed[key] = !completed[key];
            localStorage.setItem('gym_v12_pwa', JSON.stringify(completed));
            render();
        }

        function resetDay() {
            if(confirm("Deseja resetar o progresso de hoje?")) {
                Object.keys(completed).forEach(key => { if(key.startsWith(currentDayIdx + '-')) delete completed[key]; });
                localStorage.setItem('gym_v12_pwa', JSON.stringify(completed));
                render();
            }
        }

        function showHistory() {
            const modal = document.createElement('div');
            modal.id = 'history-modal';
            modal.className = 'fixed inset-0 z-[100] bg-black/90 backdrop-blur-md p-6 overflow-y-auto';
            let historyHTML = `
                <div class="flex justify-between items-center mb-8 pt-4">
                    <h2 class="text-2xl font-black text-indigo-500 italic uppercase">Histórico</h2>
                    <button onclick="document.getElementById('history-modal').remove()" class="p-2 bg-gemini-surface rounded-xl"><i data-lucide="x" class="text-slate-400"></i></button>
                </div>
                <div class="space-y-4">
            `;
            if (history.length === 0) historyHTML += `<p class="text-center text-slate-500 py-20 text-sm">Semana inicial...</p>`;
            else history.forEach(item => {
                historyHTML += `
                    <div class="history-card p-5 rounded-3xl border border-gemini-border">
                        <div class="flex justify-between items-center">
                            <div><p class="text-[10px] font-bold text-indigo-500 uppercase">Semana de ${item.date}</p>
                            <h3 class="text-lg font-black text-white">${item.stats.done} Exercícios</h3></div>
                            <span class="bg-indigo-500/20 text-indigo-400 text-[10px] font-black px-3 py-1 rounded-full">${item.stats.pct}%</span>
                        </div>
                    </div>
                `;
            });
            historyHTML += `</div>`;
            modal.innerHTML = historyHTML;
            document.body.appendChild(modal);
            lucide.createIcons();
        }

        function render() {
            const day = workoutData[currentDayIdx];
            const exs = day.exercises;
            const doneToday = exs.filter((_, i) => completed[`${currentDayIdx}-${i}`]).length;
            const pctToday = Math.round((doneToday / exs.length) * 100);
            const formattedDayName = (day.day === "Sábado" || day.day === "Domingo") ? day.day : `${day.day}-feira`;

            document.getElementById('app').innerHTML = `
                <header class="p-8 sticky top-0 z-20 bg-gemini-bg/95 backdrop-blur-md rounded-b-[2.5rem] border-b border-gemini-border shadow-2xl">
                    <div class="flex justify-between items-center mb-6 pt-2">
                        <div><p class="text-[10px] font-bold uppercase tracking-[0.2em] text-indigo-500 mb-1">${SUB_TITLE}</p>
                        <h1 class="text-2xl font-black italic tracking-tighter text-white leading-none">${APP_NAME}</h1></div>
                        <div class="flex gap-2">
                            <button onclick="showHistory()" class="w-10 h-10 flex items-center justify-center bg-gemini-surface border border-gemini-border rounded-xl text-slate-400 active:scale-90 transition-all"><i data-lucide="history" class="w-5 h-5"></i></button>
                            <button onclick="resetDay()" class="w-10 h-10 flex items-center justify-center bg-gemini-surface border border-gemini-border rounded-xl text-slate-400 active:scale-90 transition-all"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                    <div class="bg-gemini-surface p-4 rounded-2xl border border-gemini-border shadow-inner text-center">
                        <div class="w-full bg-gemini-bg h-1.5 rounded-full overflow-hidden mb-1"><div class="bg-indigo-500 h-full transition-all duration-700 shadow-indigo-500/30 shadow-md" style="width: ${pctToday}%"></div></div>
                        <span class="text-[9px] font-black uppercase text-slate-500 tracking-widest">${pctToday}% CONCLUÍDO HOJE</span>
                    </div>
                </header>

                <div class="flex overflow-x-auto gap-3 p-6 no-scrollbar snap-x">
                    ${workoutData.map((d, i) => {
                        const isActive = currentDayIdx === i;
                        const colorClass = d.type === 'cardio' ? 'btn-active-cardio' : 'btn-active-weight';
                        return `<button onclick="currentDayIdx=${i}; render()" class="flex-shrink-0 snap-start px-6 py-2.5 rounded-full text-[10px] font-black border transition-all ${isActive ? colorClass : 'bg-gemini-surface text-slate-500 border-gemini-border'}">${d.day.toUpperCase()}</button>`;
                    }).join('')}
                </div>

                <main class="px-6 space-y-4">
                    <div class="bg-gemini-surface p-6 rounded-[2.2rem] border border-gemini-border flex justify-between items-center relative overflow-hidden shadow-lg transition-all duration-500">
                        <div class="absolute left-0 top-0 bottom-0 w-2.5 ${day.type === 'cardio' ? 'bg-orange-500' : 'bg-indigo-600'}"></div>
                        <div><h2 class="text-xl font-black text-white tracking-tight leading-tight">${formattedDayName}</h2><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">${day.muscles}</p></div>
                        <div class="text-slate-700/50"><i data-lucide="${day.type === 'cardio' ? 'heart-pulse' : 'shield-check'}" class="w-10 h-10"></i></div>
                    </div>
                    <div class="space-y-3 pb-24">
                        ${exs.map((ex, i) => {
                            const isDone = completed[`${currentDayIdx}-${i}`];
                            return `<div onclick="toggle(${currentDayIdx}, ${i})" class="card-tap flex items-center gap-5 p-5 rounded-[2.2rem] border transition-all duration-300 ${isDone ? 'bg-emerald-950/20 border-emerald-900/30 opacity-50 scale-[0.98]' : 'bg-gemini-surface border-gemini-border shadow-xl'}">
                                <div class="w-11 h-11 rounded-full flex-shrink-0 flex items-center justify-center transition-all ${isDone ? 'bg-emerald-600 text-white shadow-lg' : 'bg-gemini-bg border-2 border-gemini-border text-transparent'}"><i data-lucide="check" class="w-6 h-6" stroke-width="4"></i></div>
                                <div class="flex-1"><h3 class="font-bold text-base ${isDone ? 'text-slate-600 line-through font-normal' : 'text-slate-200'} leading-tight">${ex.name}</h3><span class="text-[10px] font-black text-indigo-400/80 uppercase mt-1 inline-block tracking-tighter">${ex.sets}</span></div>
                            </div>`;
                        }).join('')}
                    </div>
                </main>
                <footer class="fixed bottom-8 left-0 right-0 flex justify-center pointer-events-none px-6">
                    <div class="bg-gemini-surface/90 text-slate-400 px-8 py-3 rounded-full text-[9px] font-black tracking-[0.4em] uppercase border border-gemini-border backdrop-blur-lg shadow-2xl flex items-center gap-3"><i data-lucide="dumbbell" class="w-4 h-4 text-indigo-500 fill-indigo-500"></i>LOMBAR PROTEGIDA • V12</div>
                </footer>
            `;
            lucide.createIcons();
        }
        render();
    </script>
</body>
</html>
