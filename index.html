<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meu Treino Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        .active-day { background-color: #4f46e5 !important; color: white !important; transform: scale(1.05); }
    </style>
</head>
<body class="bg-slate-50 pb-20">
    <div id="app"></div>

    <script>
        const workoutData = [
            { day: "Seg", muscles: "Peito, Ombro e Tríceps", type: "Musculação", exercises: [
                { name: "Supino Reto Halteres", sets: "3x12", cat: "Peito", vid: "vthMCmUMuVw" },
                { name: "Crucifixo Halteres", sets: "3x15", cat: "Peito", vid: "G9O47rK09mE" },
                { name: "Desenv. Halteres", sets: "3x10", cat: "Ombro", vid: "Up7-8Gomq8M" },
                { name: "Elevação Lateral", sets: "3x15", cat: "Ombro", vid: "Z57mG6UoWGM" },
                { name: "Tríceps Pulley", sets: "3x12", cat: "Tríceps", vid: "2-LID_Z8-0o" },
                { name: "Tríceps Francês", sets: "3x12", cat: "Tríceps", vid: "Y3WvFj6H8tE" }
            ]},
            { day: "Ter", muscles: "Costas e Bíceps", type: "Musculação", exercises: [
                { name: "Pulldown Polia", sets: "3x12", cat: "Costas", vid: "f9D-0XwYtks" },
                { name: "Face Pull Polia", sets: "3x15", cat: "Ombro Post.", vid: "rep-qV5IbNM" },
                { name: "Puxada Baixa Polia", sets: "3x12", cat: "Costas", vid: "v_74M10f8A8" },
                { name: "Remada Curvada", sets: "4x10", cat: "Costas", vid: "WvXpW888f40" },
                { name: "Rosca Martelo", sets: "3x12", cat: "Bíceps", vid: "twW2Z4Y9L9I" },
                { name: "Rosca Direta", sets: "3x12", cat: "Bíceps", vid: "i1Y8UfH9vYc" }
            ]},
            { day: "Qua", muscles: "Pernas (Máquinas)", type: "Pernas", exercises: [
                { name: "Leg Press 45°", sets: "3x12", cat: "Pernas", vid: "yZ8_Snd8TjK" },
                { name: "Cadeira Extensora", sets: "3x15", cat: "Quadríceps", vid: "m0O_n_0J0E8" },
                { name: "Cadeira Flexora", sets: "3x15", cat: "Posterior", vid: "XmEa8B4z9M0" },
                { name: "Agachamento Cálice", sets: "3x12", cat: "Pernas", vid: "MeIiV7Fv28Y" },
                { name: "RDL (Stiff) Halteres", sets: "3x12", cat: "Posterior", vid: "vB-S8oY-Y2U" },
                { name: "Elevação Pélvica", sets: "3x15", cat: "Glúteos", vid: "h_M69S1pYSw" }
            ]},
            { day: "Qui", muscles: "Esteira (Cardio)", type: "Cardio", exercises: [
                { name: "Caminhada Inclinada", sets: "30 min", cat: "Cardio", vid: "v_E4_N_k0X0" }
            ]},
            { day: "Sex", muscles: "Full Body", type: "Geral", exercises: [
                { name: "Supino Inclinado", sets: "3x12", cat: "Peito", vid: "8iP0nh-9v2E" },
                { name: "Remada Serrote", sets: "3x12", cat: "Costas", vid: "D_O856S-qL0" },
                { name: "Elevação Frontal", sets: "3x12", cat: "Ombro", vid: "v_74M10f8A8" },
                { name: "Bíceps Polia", sets: "3x15", cat: "Bíceps", vid: "twW2Z4Y9L9I" },
                { name: "Tríceps Corda", sets: "3x15", cat: "Tríceps", vid: "2-LID_Z8-0o" }
            ]},
            { day: "Sáb", muscles: "Posterior e Quadríceps", type: "Pernas", exercises: [
                { name: "Cadeira Flexora", sets: "4x12", cat: "Posterior", vid: "XmEa8B4z9M0" },
                { name: "Leg Press 45°", sets: "3x12", cat: "Pernas", vid: "yZ8_Snd8TjK" },
                { name: "Cadeira Extensora", sets: "3x15", cat: "Quadríceps", vid: "m0O_n_0J0E8" },
                { name: "Agachamento Sumô", sets: "3x15", cat: "Pernas", vid: "v_74M10f8A8" },
                { name: "Gêmeos Sentado", sets: "4x20", cat: "Panturrilhas", vid: "k_q7u-iS9zY" }
            ]},
            { day: "Dom", muscles: "Esteira (Cardio)", type: "Cardio", exercises: [
                { name: "Caminhada Leve", sets: "30 min", cat: "Cardio", vid: "v_E4_N_k0X0" }
            ]}
        ];

        let currentDayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
        let completed = JSON.parse(localStorage.getItem('gym_v5_local') || '{}');

        function save() {
            localStorage.setItem('gym_v5_local', JSON.stringify(completed));
            render();
        }

        function toggle(day, ex) {
            const key = `${day}-${ex}`;
            completed[key] = !completed[key];
            save();
        }

        function openVideo(id, title) {
            const modal = document.getElementById('modal');
            const iframe = document.getElementById('player');
            const ytLink = document.getElementById('yt-link');
            document.getElementById('m-title').innerText = title;
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
            ytLink.href = `https://www.youtube.com/watch?v=${id}`;
            modal.classList.remove('hidden');
        }

        function closeVideo() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('player').src = "";
        }

        function render() {
            const day = workoutData[currentDayIdx];
            const exs = day.exercises;
            const done = exs.filter((_, i) => completed[`${currentDayIdx}-${i}`]).length;
            const pct = Math.round((done / exs.length) * 100);

            const app = document.getElementById('app');
            app.innerHTML = `
                <header class="p-6 text-white sticky top-0 z-10 rounded-b-[2rem] shadow-xl ${day.type === 'Cardio' ? 'bg-orange-600' : 'bg-indigo-700'}">
                    <div class="flex justify-between items-center mb-4 pt-4">
                        <h1 class="text-2xl font-black italic tracking-tighter">GYM PRO</h1>
                        <button onclick="localStorage.clear(); location.reload()" class="p-2 bg-white/10 rounded-2xl"><i data-lucide="refresh-ccw" class="w-5 h-5"></i></button>
                    </div>
                    <div class="bg-black/20 p-4 rounded-2xl backdrop-blur-md">
                        <div class="flex justify-between text-[10px] font-bold mb-2 uppercase">
                            <span>${done} de ${exs.length} concluídos</span>
                            <span>${pct}%</span>
                        </div>
                        <div class="w-full bg-white/10 h-2 rounded-full overflow-hidden">
                            <div class="bg-white h-full transition-all duration-700" style="width: ${pct}%"></div>
                        </div>
                    </div>
                </header>

                <div class="flex overflow-x-auto gap-3 p-5 no-scrollbar snap-x">
                    ${workoutData.map((d, i) => `
                        <button onclick="currentDayIdx=${i}; render()" class="flex-shrink-0 px-6 py-2.5 rounded-full text-[10px] font-black border-2 transition-all ${currentDayIdx === i ? 'active-day shadow-lg shadow-indigo-200' : 'bg-white text-slate-400 border-transparent'}">
                            ${d.day.toUpperCase()}
                        </button>
                    `).join('')}
                </div>

                <main class="px-5 space-y-4">
                    <div class="bg-white p-5 rounded-3xl shadow-sm border-l-8 ${day.type === 'Cardio' ? 'border-orange-500' : 'border-indigo-600'}">
                        <h2 class="text-xl font-black text-slate-800">${day.day}-feira</h2>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">${day.muscles}</p>
                    </div>

                    <div class="space-y-3">
                        ${exs.map((ex, i) => {
                            const isDone = completed[`${currentDayIdx}-${i}`];
                            return `
                                <div class="flex items-center justify-between p-4 rounded-[2rem] border-2 transition-all duration-300 ${isDone ? 'bg-emerald-50 border-emerald-100' : 'bg-white border-transparent shadow-sm'}">
                                    <div class="flex items-center gap-4 flex-1" onclick="toggle(${currentDayIdx}, ${i})">
                                        <div class="w-9 h-9 rounded-full flex items-center justify-center transition-all ${isDone ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-200' : 'border-2 border-slate-100 text-transparent'}">
                                            <i data-lucide="check" class="w-5 h-5" stroke-width="4"></i>
                                        </div>
                                        <div>
                                            <h3 class="font-bold text-sm ${isDone ? 'text-slate-400 line-through' : 'text-slate-800'}">${ex.name}</h3>
                                            <div class="flex gap-2 items-center mt-1">
                                                <span class="text-[9px] font-black text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded uppercase">${ex.sets}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <button onclick="openVideo('${ex.vid}', '${ex.name}')" class="w-10 h-10 flex items-center justify-center text-indigo-500 bg-indigo-50 rounded-2xl">
                                        <i data-lucide="play" class="w-5 h-5" fill="currentColor"></i>
                                    </button>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </main>

                <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 hidden backdrop-blur-sm">
                    <div class="bg-white w-full max-w-lg rounded-[2.5rem] overflow-hidden relative shadow-2xl">
                        <button onclick="closeVideo()" class="absolute top-4 right-4 z-10 p-2 bg-black/60 text-white rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button>
                        <div class="aspect-video bg-black">
                            <iframe id="player" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="p-6 text-center">
                            <h3 id="m-title" class="text-xl font-black text-slate-800"></h3>
                            <a id="yt-link" target="_blank" class="mt-4 inline-block text-xs font-black text-indigo-600 bg-indigo-50 px-4 py-2 rounded-full uppercase tracking-widest">Se o vídeo não abrir, clique aqui</a>
                        </div>
                    </div>
                </div>

                <footer class="fixed bottom-6 left-0 right-0 flex justify-center pointer-events-none px-6">
                    <div class="bg-slate-900 text-white px-8 py-3 rounded-full text-[9px] font-black tracking-[0.3em] uppercase shadow-2xl flex items-center gap-3">
                        <i data-lucide="dumbbell" class="w-4 h-4 text-indigo-400"></i>
                        PRO WORKOUT
                    </div>
                </footer>
            `;
            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
