<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Meu Treino Pro - Dark</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS com suporte a Dark Mode -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media', // Ativa baseado nas configurações do sistema
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4338ca;
        }

        body { 
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Estilo do dia Ativo */
        .active-day-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            color: white !important;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            border-color: transparent !important;
        }
        
        /* Ajuste para Notch do iPhone */
        header { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 pb-32 transition-colors duration-500">
    <div id="app"></div>

    <script>
        const APP_NAME = "MEU TREINO";
        const SUB_TITLE = "Academia do Prédio";
        const FOOTER_TEXT = "DARK MODE • SINCERITY";

        const workoutData = [
            { day: "Segunda", muscles: "Peito, Ombro e Tríceps", exercises: [
                { name: "Supino Reto Halteres", sets: "3x12", vid: "vthMCmUMuVw" },
                { name: "Crucifixo Halteres", sets: "3x15", vid: "G9O47rK09mE" },
                { name: "Desenv. Halteres", sets: "3x10", vid: "Up7-8Gomq8M" },
                { name: "Elevação Lateral", sets: "3x15", vid: "Z57mG6UoWGM" },
                { name: "Tríceps Pulley", sets: "3x12", vid: "2-LID_Z8-0o" },
                { name: "Tríceps Francês", sets: "3x12", vid: "Y3WvFj6H8tE" }
            ]},
            { day: "Terça", muscles: "Costas e Bíceps", exercises: [
                { name: "Pulldown Polia", sets: "3x12", vid: "f9D-0XwYtks" },
                { name: "Face Pull Polia", sets: "3x15", vid: "rep-qV5IbNM" },
                { name: "Puxada Baixa Polia", sets: "3x12", vid: "v_74M10f8A8" },
                { name: "Remada Curvada", sets: "4x10", vid: "WvXpW888f40" },
                { name: "Rosca Martelo", sets: "3x12", vid: "twW2Z4Y9L9I" },
                { name: "Rosca Direta", sets: "3x12", vid: "i1Y8UfH9vYc" }
            ]},
            { day: "Quarta", muscles: "Pernas (Máquinas)", exercises: [
                { name: "Leg Press 45°", sets: "3x12", vid: "yZ8_Snd8TjK" },
                { name: "Cadeira Extensora", sets: "3x15", vid: "m0O_n_0J0E8" },
                { name: "Cadeira Flexora", sets: "3x15", vid: "XmEa8B4z9M0" },
                { name: "Agachamento Cálice", sets: "3x12", vid: "MeIiV7Fv28Y" },
                { name: "RDL (Stiff)", sets: "3x12", vid: "vB-S8oY-Y2U" },
                { name: "Elevação Pélvica", sets: "3x15", vid: "h_M69S1pYSw" }
            ]},
            { day: "Quinta", muscles: "Esteira (Cardio)", exercises: [
                { name: "Caminhada Inclinada", sets: "30 min", vid: "v_E4_N_k0X0" }
            ]},
            { day: "Sexta", muscles: "Full Body", exercises: [
                { name: "Supino Inclinado", sets: "3x12", vid: "8iP0nh-9v2E" },
                { name: "Remada Serrote", sets: "3x12", vid: "D_O856S-qL0" },
                { name: "Elevação Frontal", sets: "3x12", vid: "v_74M10f8A8" },
                { name: "Bíceps Polia", sets: "3x15", vid: "twW2Z4Y9L9I" },
                { name: "Tríceps Corda", sets: "3x15", vid: "2-LID_Z8-0o" }
            ]},
            { day: "Sábado", muscles: "Posterior e Quadríceps", exercises: [
                { name: "Cadeira Flexora", sets: "4x12", vid: "XmEa8B4z9M0" },
                { name: "Leg Press 45°", sets: "3x12", vid: "yZ8_Snd8TjK" },
                { name: "Cadeira Extensora", sets: "3x15", vid: "m0O_n_0J0E8" },
                { name: "Agachamento Sumô", sets: "3x15", vid: "v_74M10f8A8" },
                { name: "Gêmeos Sentado", sets: "4x20", vid: "k_q7u-iS9zY" }
            ]},
            { day: "Domingo", muscles: "Esteira (Cardio)", exercises: [
                { name: "Caminhada Leve", sets: "30 min", vid: "v_E4_N_k0X0" }
            ]}
        ];

        let currentDayIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
        let completed = JSON.parse(localStorage.getItem('gym_vFinal_save') || '{}');

        function toggle(day, ex) {
            const key = `${day}-${ex}`;
            completed[key] = !completed[key];
            localStorage.setItem('gym_vFinal_save', JSON.stringify(completed));
            render();
        }

        function resetAll() {
            if(confirm("Desejas limpar todo o progresso da semana?")) {
                completed = {};
                localStorage.setItem('gym_vFinal_save', JSON.stringify(completed));
                render();
            }
        }

        function openVideo(id, title) {
            const modal = document.getElementById('modal');
            const iframe = document.getElementById('player');
            const ytLink = document.getElementById('yt-link');
            document.getElementById('m-title').innerText = title;
            iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;
            ytLink.href = `https://www.youtube.com/watch?v=${id}`;
            modal.classList.remove('hidden');
        }

        function closeVideo() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('player').src = "";
        }

        function render() {
            const day = workoutData[currentDayIdx];
            const exs = day.exercises;
            const done = exs.filter((_, i) => completed[`${currentDayIdx}-${i}`]).length;
            const pct = Math.round((done / exs.length) * 100);
            const isCardio = day.muscles.includes('Esteira');

            document.getElementById('app').innerHTML = `
                <!-- HEADER -->
                <header class="p-8 text-white sticky top-0 z-10 rounded-b-[3rem] shadow-2xl transition-all duration-700 ${isCardio ? 'bg-orange-600' : 'bg-indigo-700'}">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <p class="text-[10px] font-bold uppercase tracking-[0.3em] opacity-70 mb-1">${SUB_TITLE}</p>
                            <h1 class="text-3xl font-[900] italic tracking-tighter leading-none">${APP_NAME}</h1>
                        </div>
                        <button onclick="resetAll()" class="w-12 h-12 flex items-center justify-center bg-white/20 rounded-2xl active:scale-90 transition-transform backdrop-blur-md">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <div class="bg-black/10 dark:bg-black/30 p-5 rounded-[2rem] border border-white/10 backdrop-blur-md">
                        <div class="flex justify-between text-[10px] font-black mb-3 uppercase tracking-widest">
                            <span>Meta do Dia</span>
                            <span>${pct}%</span>
                        </div>
                        <div class="w-full bg-white/20 h-3 rounded-full overflow-hidden p-[2px]">
                            <div class="bg-white h-full rounded-full transition-all duration-1000 ease-out" style="width: ${pct}%"></div>
                        </div>
                    </div>
                </header>

                <!-- DIAS -->
                <div class="flex overflow-x-auto gap-4 p-6 no-scrollbar snap-x">
                    ${workoutData.map((d, i) => `
                        <button onclick="currentDayIdx=${i}; render()" class="flex-shrink-0 snap-start px-8 py-3 rounded-2xl text-[11px] font-black border-2 transition-all duration-300 ${currentDayIdx === i ? 'active-day-btn' : 'bg-white dark:bg-slate-900 text-slate-400 dark:text-slate-500 border-slate-100 dark:border-slate-800'}">
                            ${d.day.toUpperCase()}
                        </button>
                    `).join('')}
                </div>

                <!-- CARDS -->
                <main class="px-6 space-y-5">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-[2.5rem] shadow-sm border-l-[12px] ${isCardio ? 'border-orange-500' : 'border-indigo-600'} flex justify-between items-center transition-colors duration-500">
                        <div>
                            <h2 class="text-2xl font-black text-slate-800 dark:text-slate-100 tracking-tight leading-none">${day.day}-feira</h2>
                            <p class="text-[10px] font-bold text-indigo-500 dark:text-indigo-400 uppercase tracking-widest mt-2">${day.muscles}</p>
                        </div>
                        <div class="w-12 h-12 bg-slate-50 dark:bg-slate-800 rounded-full flex items-center justify-center text-slate-300 dark:text-slate-600">
                             <i data-lucide="${isCardio ? 'heart-pulse' : 'dumbbell'}" class="w-6 h-6"></i>
                        </div>
                    </div>

                    <div class="space-y-3 pb-10">
                        ${exs.map((ex, i) => {
                            const isDone = completed[`${currentDayIdx}-${i}`];
                            return `
                                <div class="flex items-center justify-between p-5 rounded-[2.5rem] border-2 transition-all duration-300 ${isDone ? 'bg-emerald-50/50 dark:bg-emerald-950/20 border-emerald-100 dark:border-emerald-900/50 opacity-70' : 'bg-white dark:bg-slate-900 border-transparent dark:border-slate-800 shadow-sm'}">
                                    <div class="flex items-center gap-5 flex-1" onclick="toggle(${currentDayIdx}, ${i})">
                                        <div class="w-11 h-11 rounded-full flex items-center justify-center transition-all duration-500 ${isDone ? 'bg-emerald-500 text-white shadow-lg shadow-emerald-200' : 'bg-slate-50 dark:bg-slate-800 text-slate-200 dark:text-slate-700 border-2 border-slate-100 dark:border-slate-800'}">
                                            <i data-lucide="check" class="w-5 h-5" stroke-width="4"></i>
                                        </div>
                                        <div>
                                            <h3 class="font-bold text-[14px] ${isDone ? 'text-slate-400 dark:text-slate-600 line-through' : 'text-slate-800 dark:text-slate-200'} leading-tight">${ex.name}</h3>
                                            <span class="text-[9px] font-black text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 px-3 py-1 rounded-full uppercase mt-2 inline-block">${ex.sets}</span>
                                        </div>
                                    </div>
                                    <button onclick="openVideo('${ex.vid}', '${ex.name}')" class="w-11 h-11 flex items-center justify-center text-indigo-500 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 rounded-2xl active:scale-95 transition-all">
                                        <i data-lucide="play" class="w-5 h-5" fill="currentColor"></i>
                                    </button>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </main>

                <!-- MODAL -->
                <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-5 bg-black/95 hidden backdrop-blur-md">
                    <div class="bg-white dark:bg-slate-900 w-full max-w-lg rounded-[3rem] overflow-hidden relative shadow-2xl transition-colors duration-500">
                        <button onclick="closeVideo()" class="absolute top-5 right-5 z-10 p-3 bg-black/50 text-white rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button>
                        <div class="aspect-video bg-black">
                            <iframe id="player" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="p-8 text-center">
                            <h3 id="m-title" class="text-xl font-black text-slate-800 dark:text-slate-100 mb-2"></h3>
                            <a id="yt-link" target="_blank" class="w-full inline-block text-[11px] font-black text-white bg-indigo-600 px-6 py-4 rounded-2xl uppercase tracking-widest active:scale-95 transition-all">Abrir no YouTube</a>
                        </div>
                    </div>
                </div>

                <!-- FOOTER -->
                <footer class="fixed bottom-8 left-0 right-0 flex justify-center pointer-events-none px-8">
                    <div class="bg-slate-900/90 dark:bg-indigo-950/90 text-white px-10 py-4 rounded-[2rem] text-[10px] font-black tracking-[0.4em] uppercase shadow-2xl border border-white/10 backdrop-blur-lg flex items-center gap-4">
                        <i data-lucide="moon" class="w-4 h-4 text-amber-400 fill-amber-400"></i>
                        ${FOOTER_TEXT}
                    </div>
                </footer>
            `;
            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
